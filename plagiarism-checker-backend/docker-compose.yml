version: '3.8'

services:
  # 1. Qdrant - Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    ports:
      - "6333:6333" # Cổng API RESTful
      - "6334:6334" # Cổng gRPC (Tốc độ cao)
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: always

  # 2. Redis - Message Broker / Task Queue
  redis:
    image: redis:alpine
    container_name: redis_queue
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

# Định nghĩa Volumes để dữ liệu không bị mất khi tắt máy
volumes:
  qdrant_storage:
  redis_data: